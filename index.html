<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduPortal — Examination System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{--bg:#060818;--blue:#63b3ed;--teal:#4fd1c5;--indigo:#7f9cf5;--green:#68d391;--amber:#f6ad55;--rose:#fc8181;--text:#e2e8f0;--muted:#718096}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(99,179,237,.3);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:.8}100%{transform:scale(1.6);opacity:0}}
@keyframes lockPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes countdownTick{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.fade-up{animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both}
.fade-up-1{animation:fadeUp .55s .1s cubic-bezier(.16,1,.3,1) both}
.fade-up-2{animation:fadeUp .55s .2s cubic-bezier(.16,1,.3,1) both}
.fade-up-3{animation:fadeUp .55s .3s cubic-bezier(.16,1,.3,1) both}
.fade-up-4{animation:fadeUp .55s .4s cubic-bezier(.16,1,.3,1) both}
.fade-in{animation:fadeIn .4s ease both}
.scale-in{animation:scaleIn .3s cubic-bezier(.16,1,.3,1) both}
.grad-text{background:linear-gradient(135deg,#63b3ed,#7f9cf5,#4fd1c5);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradShift 4s ease infinite}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;background:linear-gradient(135deg,#63b3ed,#7f9cf5);color:#fff;transition:all .25s;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(99,179,237,.3)}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#7f9cf5,#63b3ed);opacity:0;transition:opacity .25s}
.btn-primary:hover::before{opacity:1}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,179,237,.45)}
.btn-primary span{position:relative;z-index:1}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 26px;border-radius:12px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;background:transparent;color:#63b3ed;border:1.5px solid rgba(99,179,237,.4);transition:all .25s}
.btn-ghost:hover{background:rgba(99,179,237,.1);border-color:#63b3ed;transform:translateY(-2px)}
.btn-danger{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:1.5px solid rgba(252,129,129,.4);background:rgba(252,129,129,.08);color:#fc8181;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-danger:hover{background:rgba(252,129,129,.18);border-color:#fc8181}
.btn-edit{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:1.5px solid rgba(99,179,237,.3);background:rgba(99,179,237,.07);color:#63b3ed;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-edit:hover{background:rgba(99,179,237,.15);border-color:#63b3ed}
.btn-green{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:1.5px solid rgba(104,211,145,.3);background:rgba(104,211,145,.07);color:#68d391;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-green:hover{background:rgba(104,211,145,.15)}
.btn-amber{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:1.5px solid rgba(246,173,85,.3);background:rgba(246,173,85,.07);color:#f6ad55;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-amber:hover{background:rgba(246,173,85,.15)}
.btn-back{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);color:#a0aec0;transition:all .2s}
.btn-back:hover{background:rgba(255,255,255,.09);color:#e2e8f0;border-color:rgba(255,255,255,.2)}
.ep-input{width:100%;padding:12px 16px;border-radius:11px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);color:#e2e8f0;font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:all .2s}
.ep-input:focus{border-color:rgba(99,179,237,.6);background:rgba(99,179,237,.05);box-shadow:0 0 0 3px rgba(99,179,237,.1)}
.ep-input::placeholder{color:#4a5568}
.ep-label{font-size:12px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:7px}
.nav-item{width:100%;padding:11px 14px;border-radius:10px;border:1px solid transparent;background:transparent;color:#718096;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:4px;transition:all .2s}
.nav-item:hover{background:rgba(255,255,255,.05);color:#a0aec0}
.nav-item.active{background:linear-gradient(135deg,rgba(99,179,237,.15),rgba(127,156,245,.15));border-color:rgba(99,179,237,.3);color:#63b3ed;font-weight:600}
.ep-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;transition:all .25s}
.ep-card:hover{border-color:rgba(99,179,237,.2);background:rgba(255,255,255,.05)}
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(6,8,24,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal-box{background:#0d1117;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:scaleIn .25s cubic-bezier(.16,1,.3,1);box-shadow:0 30px 80px rgba(0,0,0,.7)}
.glow-dot{width:8px;height:8px;border-radius:50%;background:#68d391;position:relative;display:inline-block}
.glow-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:#68d391;animation:pulse-ring 1.5s ease-out infinite}
.feat-card{flex:1 1 180px;padding:28px 22px;border-radius:18px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);text-align:center;transition:all .3s;cursor:default}
.feat-card:hover{transform:translateY(-6px);border-color:rgba(99,179,237,.3)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.student-row{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;transition:all .2s}
.student-row:hover{border-color:rgba(99,179,237,.2);background:rgba(255,255,255,.05)}
.ep-table{width:100%;border-collapse:collapse;font-size:13px}
.ep-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#718096;border-bottom:1px solid rgba(255,255,255,.07)}
.ep-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e0}
.ep-table tr:last-child td{border-bottom:none}
.ep-table tr:hover td{background:rgba(255,255,255,.03)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:rgba(99,179,237,.15);color:#63b3ed;border:1px solid rgba(99,179,237,.3)}
.badge-green{background:rgba(104,211,145,.15);color:#68d391;border:1px solid rgba(104,211,145,.3)}
.badge-amber{background:rgba(246,173,85,.15);color:#f6ad55;border:1px solid rgba(246,173,85,.3)}
.badge-rose{background:rgba(252,129,129,.15);color:#fc8181;border:1px solid rgba(252,129,129,.3)}
.badge-muted{background:rgba(255,255,255,.05);color:#718096;border:1px solid rgba(255,255,255,.1)}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:22px 20px;transition:all .25s}
.stat-card:hover{border-color:rgba(99,179,237,.25);transform:translateY(-3px)}
.ep-header{position:sticky;top:0;z-index:90;background:rgba(6,8,24,.8);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid rgba(255,255,255,.07);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.ep-sidebar{width:230px;flex-shrink:0;background:rgba(255,255,255,.02);border-right:1px solid rgba(255,255,255,.06);padding:24px 14px;display:flex;flex-direction:column;min-height:calc(100vh - 64px)}
.err-box{background:rgba(252,129,129,.08);border:1px solid rgba(252,129,129,.3);border-radius:10px;padding:12px 16px;color:#fc8181;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:18px}
.success-box{background:rgba(104,211,145,.08);border:1px solid rgba(104,211,145,.3);border-radius:10px;padding:12px 16px;color:#68d391;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:18px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;background:linear-gradient(135deg,#63b3ed,#7f9cf5);color:#fff}
.lock-overlay{background:rgba(6,8,24,.9);border:1px solid rgba(252,129,129,.2);border-radius:14px;padding:28px;text-align:center;animation:lockPulse 2s ease infinite}
.countdown-box{display:inline-flex;flex-direction:column;align-items:center;background:rgba(252,129,129,.08);border:1px solid rgba(252,129,129,.25);border-radius:12px;padding:14px 24px;margin:0 6px;min-width:70px}
.countdown-num{font-size:36px;font-weight:900;color:#fc8181;line-height:1;animation:countdownTick 1s ease infinite}
.countdown-label{font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.drop-zone{border:2px dashed rgba(99,179,237,.3);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(99,179,237,.03)}
.drop-zone:hover,.drop-zone.drag-over{border-color:#63b3ed;background:rgba(99,179,237,.08)}
.hall-config-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:10px}
.seat-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.seat-cell{width:36px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#4a5568;transition:all .2s}
.seat-cell.occupied{background:linear-gradient(135deg,rgba(99,179,237,.2),rgba(127,156,245,.2));border-color:rgba(99,179,237,.4);color:#63b3ed}
.seat-cell.highlight{background:linear-gradient(135deg,#f6ad55,#fc8181);border-color:#f6ad55;color:#fff;transform:scale(1.1);box-shadow:0 0 10px rgba(246,173,85,.4)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const ADMIN={email:"admin@gmail.com",password:"123"};

// ─── Helpers ───────────────────────────────────────────────
const fmtDate=d=>{try{return new Date(d).toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short",year:"numeric"});}catch{return d;}};
const pad=n=>String(n).padStart(2,"0");

function getCountdown(unlockDT){
  const diff=new Date(unlockDT)-new Date();
  if(diff<=0)return null;
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  return{h,m,s,diff};
}

// Given sorted students + hall configs → assign seats
function assignSeats(students,halls){
  // sorted by regNo
  const sorted=[...students].sort((a,b)=>String(a.regNo).localeCompare(String(b.regNo),undefined,{numeric:true}));
  const slots=[];
  for(const hall of halls){
    const sections=hall.sections||["A","B","C","D"];
    const seatsPerSection=hall.seatsPerSection||Math.ceil((hall.capacity||(hall.rows||1)*(hall.cols||1))/sections.length);
    // Interleaved order: A1,B1,C1,D1, A2,B2,C2,D2 ...
    for(let num=1;num<=seatsPerSection;num++){
      for(const sec of sections){
        slots.push({hall:hall.name,seat:`${sec}${num}`});
      }
    }
  }
  return sorted.map((s,i)=>({
    ...s,
    assignedHall:slots[i]?.hall||"Unassigned",
    assignedSeat:slots[i]?.seat||"—",
  }));
}

// ─── Logo ───────────────────────────────────────────────────
function Logo({size=32}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{width:size,height:size,borderRadius:size*0.3,background:"linear-gradient(135deg,#63b3ed,#7f9cf5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.5,boxShadow:"0 4px 16px rgba(99,179,237,0.4)"}}>🎓</div>
      <div>
        <div style={{fontSize:size*0.5,fontWeight:800,background:"linear-gradient(135deg,#63b3ed,#7f9cf5)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>EduPortal</div>
        <div style={{fontSize:9,color:"#4a5568",letterSpacing:2,textTransform:"uppercase",marginTop:-2}}>Examination System</div>
      </div>
    </div>
  );
}

// ─── Landing ────────────────────────────────────────────────
function LandingPage({goLogin,goSignup}){
  const stats=[{val:"2,400+",label:"Students"},{val:"48",label:"Departments"},{val:"99.9%",label:"Uptime"},{val:"12+",label:"Years"}];
  const features=[
    {icon:"🎫",title:"Hall Tickets",desc:"Official exam hall tickets with seat details",color:"#63b3ed"},
    {icon:"📍",title:"Auto Seating",desc:"Reg-number ordered auto seat assignment",color:"#4fd1c5"},
    {icon:"⏱️",title:"Time Lock",desc:"Seats revealed only 1 hr before exam",color:"#7f9cf5"},
    {icon:"🔐",title:"Secure Access",desc:"Role-based authentication & data privacy",color:"#68d391"},
  ];
  return(
    <div style={{minHeight:"100vh",background:"#060818",color:"#e2e8f0",overflow:"hidden",position:"relative"}}>
      <div className="orb" style={{width:600,height:600,top:-200,left:-200,background:"radial-gradient(circle,rgba(99,179,237,0.12) 0%,transparent 70%)"}}/>
      <div className="orb" style={{width:500,height:500,top:100,right:-150,background:"radial-gradient(circle,rgba(127,156,245,0.1) 0%,transparent 70%)"}}/>
      <header className="ep-header">
        <Logo size={36}/>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div className="glow-dot" style={{marginRight:4}}/>
          <span style={{fontSize:12,color:"#718096",marginRight:8}}>Live System</span>
          <button className="btn-ghost" onClick={goLogin} style={{padding:"9px 22px"}}>Login</button>
          <button className="btn-primary" onClick={goSignup}><span>Sign Up</span></button>
        </div>
      </header>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"80px 32px 60px",textAlign:"center",position:"relative"}}>
        <div className="fade-up" style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(99,179,237,0.1)",border:"1px solid rgba(99,179,237,0.25)",borderRadius:20,padding:"6px 16px",marginBottom:28,fontSize:12,color:"#63b3ed",fontWeight:600,letterSpacing:1}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#63b3ed",display:"inline-block"}}/>
          OFFICIAL EXAMINATION PORTAL
        </div>
        <h1 className="fade-up-1" style={{fontSize:"clamp(38px,6vw,76px)",fontWeight:900,lineHeight:1.08,marginBottom:22,letterSpacing:-2}}>
          Your Exams,<br/><span className="grad-text">Organized Perfectly</span>
        </h1>
        <p className="fade-up-2" style={{fontSize:"clamp(15px,2vw,18px)",color:"#718096",maxWidth:520,margin:"0 auto 40px",lineHeight:1.75}}>
          Access hall tickets, seat assignments, exam schedules and more — all from one intelligent platform built for modern colleges.
        </p>
        <div className="fade-up-3" style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn-primary" onClick={goLogin} style={{padding:"15px 36px",fontSize:15,borderRadius:14}}><span>Student Login →</span></button>
          <button className="btn-ghost" onClick={goSignup} style={{padding:"14px 32px",fontSize:15,borderRadius:14}}>Register Now</button>
        </div>
        <div className="fade-up-4" style={{display:"flex",justifyContent:"center",marginTop:60,flexWrap:"wrap"}}>
          {stats.map((s,i)=>(
            <div key={i} style={{padding:"18px 36px",borderRight:i<stats.length-1?"1px solid rgba(255,255,255,0.07)":"none",textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:800,background:"linear-gradient(135deg,#63b3ed,#7f9cf5)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{s.val}</div>
              <div style={{fontSize:12,color:"#4a5568",marginTop:3}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{maxWidth:1000,margin:"0 auto",padding:"20px 32px 80px"}}>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
          {features.map((f,i)=>(
            <div key={i} className="feat-card fade-up" style={{animationDelay:`${0.1*i}s`}}>
              <div style={{width:52,height:52,borderRadius:14,background:`rgba(${f.color==="#63b3ed"?"99,179,237":f.color==="#4fd1c5"?"79,209,197":f.color==="#7f9cf5"?"127,156,245":f.color==="#68d391"?"104,211,145":"246,173,85"},0.12)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 16px",border:`1px solid ${f.color}30`}}>{f.icon}</div>
              <div style={{fontSize:15,fontWeight:700,color:f.color,marginBottom:8}}>{f.title}</div>
              <div style={{fontSize:12,color:"#4a5568",lineHeight:1.6}}>{f.desc}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{borderTop:"1px solid rgba(255,255,255,0.05)",padding:"20px 32px",textAlign:"center",color:"#2d3748",fontSize:12}}>
        © 2026 EduPortal · Secure Examination Management System
      </div>
    </div>
  );
}

// ─── Login ──────────────────────────────────────────────────
function LoginPage({students,onSuccess,goBack,goSignup}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [show,setShow]=useState(false);
  const [loading,setLoading]=useState(false);
  const login=()=>{
    setErr("");setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      const t=email.trim().toLowerCase();
      if(t===ADMIN.email&&pass===ADMIN.password){onSuccess({role:"admin"});return;}
      const s=students.find(x=>x.email.trim().toLowerCase()===t&&x.password===pass);
      if(s){onSuccess({role:"student",id:s.id});return;}
      setErr("Invalid email or password. Please try again.");
    },600);
  };
  return(
    <div style={{minHeight:"100vh",background:"#060818",display:"flex",position:"relative",overflow:"hidden"}}>
      <div className="orb" style={{width:700,height:700,top:-300,right:-300,background:"radial-gradient(circle,rgba(127,156,245,0.12) 0%,transparent 70%)"}}/>
      <div className="orb" style={{width:500,height:500,bottom:-200,left:-200,background:"radial-gradient(circle,rgba(79,209,197,0.08) 0%,transparent 70%)"}}/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div className="scale-in" style={{width:"100%",maxWidth:420}}>
          <button className="btn-back" onClick={goBack} style={{marginBottom:28}}>← Back to Home</button>
          <div style={{marginBottom:36}}><Logo size={40}/></div>
          <h2 style={{fontSize:26,fontWeight:800,marginBottom:6,letterSpacing:-0.5}}>Welcome back</h2>
          <p style={{fontSize:14,color:"#718096",marginBottom:32}}>Sign in to access your exam details</p>
          {err&&<div className="err-box">⚠️ {err}</div>}
          <div style={{marginBottom:16}}>
            <label className="ep-label">Email Address</label>
            <input className="ep-input" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
          </div>
          <div style={{marginBottom:24,position:"relative"}}>
            <label className="ep-label">Password</label>
            <input className="ep-input" type={show?"text":"password"} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} style={{paddingRight:48}}/>
            <button onClick={()=>setShow(!show)} style={{position:"absolute",right:14,top:36,background:"none",border:"none",color:"#718096",cursor:"pointer",fontSize:16}}>{show?"🙈":"👁️"}</button>

// ─── Countdown Component ────────────────────────────────────
function Countdown({unlockDT,onUnlocked}){
  const [cd,setCd]=useState(()=>getCountdown(unlockDT));
  useEffect(()=>{
    const t=setInterval(()=>{
      const v=getCountdown(unlockDT);
      setCd(v);
      if(!v)onUnlocked();
    },1000);
    return()=>clearInterval(t);
  },[unlockDT]);
  if(!cd)return null;
  return(
    <div style={{display:"flex",gap:4,justifyContent:"center",margin:"16px 0"}}>
      <div className="countdown-box"><div className="countdown-num">{pad(cd.h)}</div><div className="countdown-label">Hours</div></div>
      <div style={{fontSize:28,fontWeight:900,color:"#fc8181",alignSelf:"center",marginTop:-8}}>:</div>
      <div className="countdown-box"><div className="countdown-num">{pad(cd.m)}</div><div className="countdown-label">Mins</div></div>
      <div style={{fontSize:28,fontWeight:900,color:"#fc8181",alignSelf:"center",marginTop:-8}}>:</div>
      <div className="countdown-box"><div className="countdown-num">{pad(cd.s)}</div><div className="countdown-label">Secs</div></div>
    </div>
  );
}

// ─── CSV Parser ─────────────────────────────────────────────
function parseCSV(text){
  const lines=text.trim().split("\n");
  if(lines.length<2)return[];
  const raw=lines[0].split(",").map(h=>h.trim());
  const headers=raw.map(h=>h.toLowerCase().replace(/\s+/g,"_").replace(/[()]/g,""));
  const isMarksSheet=raw.some(h=>/prn/i.test(h)||/name of student/i.test(h)||/adm.?no/i.test(h));
  return lines.slice(1).map((line,i)=>{
    const vals=line.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
    const obj={id:Date.now()+i,password:"Student@123",hallTicket:"",assignedHall:"",assignedSeat:"",exams:[]};
    headers.forEach((h,idx)=>{obj[h]=vals[idx]||"";});
    if(isMarksSheet){
      const nameKey=headers.find(h=>h.includes("name"));
      const prnKey=headers.find(h=>h==="prn");
      const admKey=headers.find(h=>h.includes("adm"));
      obj.name=nameKey?obj[nameKey]:"";
      obj.regNo=prnKey?obj[prnKey]:(admKey?obj[admKey]:"");
      obj.hallTicket=admKey?obj[admKey]:"";
      obj.email=obj.regNo?obj.regNo.toLowerCase()+"@student.edu":"";
      const skipFlags=["tc","agniveer","rollout",""];
      if(!obj.name||skipFlags.includes(obj.name.toLowerCase()))return null;
      if(!obj.regNo||obj.regNo.length<4)return null;
    } else {
      if(!obj.name&&obj.student_name)obj.name=obj.student_name;
      if(!obj.regNo)obj.regNo=obj.prn||obj.regno||obj.reg_no||obj.registration_number||"";
      if(!obj.email)obj.email=obj.regNo?obj.regNo.toLowerCase()+"@student.edu":"";
    }
    return obj;
  }).filter(Boolean).filter(s=>s.name&&s.regNo);
}


// ─── Download Helpers ────────────────────────────────────────
function getSortedSeating(students){
  return [...students]
    .filter(s=>s.assignedSeat&&s.assignedSeat!=="—")
    .sort((a,b)=>String(a.regNo).localeCompare(String(b.regNo),undefined,{numeric:true}));
}

function blobDownload(filename, content, mime){
  try{
    const blob=new Blob([content],{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){console.error("Download error:",e);}
}

function AdminDashboard({students,setStudents,exam,setExam,halls,setHalls,onLogout}){
  const [tab,setTab]=useState("overview");

  // Students tab state
  const [addOpen,setAddOpen]=useState(false);
  const [editS,setEditS]=useState(null);
  const [delId,setDelId]=useState(null);
  const [newS,setNewS]=useState({});
  const [csvMsg,setCsvMsg]=useState("");
  const fileRef=useRef();
  const dragRef=useRef();

  // Seating tab state
  // halls & setHalls come from App (persisted in localStorage)
  const [newHall,setNewHall]=useState({name:"",capacity:40});
  const [seatingDone,setSeatingDone]=useState(false);
  const hasSeating=seatingDone||students.some(s=>s.assignedSeat&&s.assignedSeat!=="—");
  const [arranged,setArranged]=useState([]);

  // Exam tab state
  const [examForm,setExamForm]=useState(exam||{id:1,examName:"",date:"",time:"",unlockDateTime:""});
  const [examSaved,setExamSaved]=useState(false);

  const FIELDS=[["Full Name","name"],["Reg. Number","regNo"],["Email","email"],["Password","password"],["Department","department"],["Semester","semester"],["Hall Ticket","hallTicket"]];

  const doAdd=()=>{if(!newS.name||!newS.regNo){return;}const id=Date.now();setStudents(p=>[...p,{...newS,id,assignedHall:"",assignedSeat:"",exams:[]}]);setAddOpen(false);setNewS({});setSeatingDone(false);};
  const saveEdit=()=>{setStudents(p=>p.map(s=>s.id===editS.id?editS:s));setEditS(null);};
  const doDelete=()=>{setStudents(p=>p.filter(s=>s.id!==delId));setDelId(null);setSeatingDone(false);};

  // CSV Upload
  const handleCSV=text=>{
    const parsed=parseCSV(text);
    if(!parsed.length){setCsvMsg("❌ Could not parse CSV. Check format.");return;}
    setStudents(prev=>{
      const existing=new Set(prev.map(s=>s.regNo));
      const fresh=parsed.filter(p=>!existing.has(p.regNo));
      return[...prev,...fresh];
    });
    setCsvMsg(`✅ Imported ${parsed.length} student(s) successfully.`);
    setSeatingDone(false);
    setTimeout(()=>setCsvMsg(""),4000);
  };
  const onFileChange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>handleCSV(ev.target.result);r.readAsText(f);
  };
  const onDrop=e=>{
    e.preventDefault();dragRef.current?.classList.remove("drag-over");
    const f=e.dataTransfer.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>handleCSV(ev.target.result);r.readAsText(f);
  };

  // Auto seating
  const doArrangeSeating=()=>{
    if(!students.length||!halls.length)return;
    const result=assignSeats(students,halls);
    setStudents(result);
    setArranged(result);
    setSeatingDone(true);
  };
  const addHall=()=>{
    if(!newHall.name)return;
    const cap=parseInt(newHall.capacity)||40;
    const allSecs=["A","B","C","D","E","F"];
    const numSecs=cap<=15?2:cap<=30?3:cap<=80?4:cap<=120?5:6;
    const secs=allSecs.slice(0,numSecs);
    const seatsPerSection=Math.ceil(cap/secs.length);
    setHalls(p=>[...p,{id:Date.now(),name:newHall.name,capacity:cap,sections:secs,seatsPerSection,rows:seatsPerSection,cols:secs.length}]);
    setNewHall({name:"",capacity:40});
    setSeatingDone(false);
  };
  const removeHall=id=>setHalls(p=>p.filter(h=>h.id!==id));

  // Exam config
  const saveExam=()=>{
    // Always auto-calculate unlock = exam time - 1 hour on save
    let finalForm={...examForm,id:examForm.id||1};
    if(examForm.date&&examForm.time){
      const dt=new Date(`${examForm.date}T${examForm.time}`);
      dt.setHours(dt.getHours()-1);
      finalForm.unlockDateTime=dt.toISOString().slice(0,16);
    }
    setExam(finalForm);
    setExamForm(finalForm);
    setExamSaved(true);
    setTimeout(()=>setExamSaved(false),3000);
  };
  const autoUnlock=()=>{
    if(!examForm.date||!examForm.time)return;
    const dt=new Date(`${examForm.date}T${examForm.time}`);
    dt.setHours(dt.getHours()-1);
    setExamForm(p=>({...p,unlockDateTime:dt.toISOString().slice(0,16)}));
  };

  // Stats
  const totalSeats=halls.reduce((a,h)=>a+(h.capacity||(h.rows||1)*(h.cols||1)),0);
  const statCards=[
    {icon:"👥",label:"Total Students",val:students.length,color:"#63b3ed"},
    {icon:"🏛️",label:"Total Halls",val:halls.length,color:"#4fd1c5"},
    {icon:"💺",label:"Total Seats",val:totalSeats,color:"#7f9cf5"},
    {icon:"✅",label:"Assigned",val:students.filter(s=>s.assignedSeat&&s.assignedSeat!=="—").length,color:"#68d391"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#060818",color:"#e2e8f0",display:"flex",flexDirection:"column"}}>
      <header className="ep-header">
        <Logo size={32}/>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div className="badge badge-amber">🔑 Admin</div>
          <button className="btn-danger" onClick={onLogout} style={{padding:"7px 14px"}}>Logout</button>
        </div>
      </header>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <aside className="ep-sidebar">
          <div style={{fontSize:10,fontWeight:700,color:"#2d3748",letterSpacing:2,textTransform:"uppercase",marginBottom:12,paddingLeft:6}}>ADMIN PANEL</div>
          {[["overview","📊","Overview"],["students","👥","Students"],["seating","💺","Seating"],["exam","📅","Exam Config"]].map(([id,icon,label])=>(
            <button key={id} className={`nav-item${tab===id?" active":""}`} onClick={()=>setTab(id)}>
              <span style={{fontSize:16}}>{icon}</span>{label}
            </button>
          ))}
          <div style={{marginTop:"auto",paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
            <button className="btn-back" onClick={onLogout} style={{width:"100%",justifyContent:"center"}}>⬅ Logout</button>
          </div>
        </aside>

        <main style={{flex:1,padding:32,overflowY:"auto"}}>

          {/* ── OVERVIEW ── */}
          {tab==="overview"&&(
            <div className="fade-in">
              <h2 style={{fontSize:22,fontWeight:800,marginBottom:24,letterSpacing:-0.5}}>Dashboard Overview</h2>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14,marginBottom:32}}>
                {statCards.map((s,i)=>(
                  <div key={i} className="stat-card" style={{animation:`fadeUp 0.4s ${i*0.08}s both`}}>
                    <div style={{fontSize:24,marginBottom:10}}>{s.icon}</div>
                    <div style={{fontSize:28,fontWeight:900,color:s.color}}>{s.val}</div>
                    <div style={{fontSize:12,color:"#4a5568",marginTop:2}}>{s.label}</div>
                  </div>
                ))}
              </div>
              {exam&&(
                <div className="ep-card" style={{padding:20,marginBottom:20,background:"rgba(99,179,237,0.04)"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#718096",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>📅 Active Exam</div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
                    <div style={{fontSize:18,fontWeight:800}}>{exam.examName||"—"}</div>
                    <span className="badge badge-blue">{fmtDate(exam.date)}</span>
                    <span className="badge badge-muted">{exam.time}</span>
                    <span className="badge badge-amber">🔓 Unlocks: {exam.unlockDateTime?new Date(exam.unlockDateTime).toLocaleString("en-IN"):"Not set"}</span>
                  </div>
                </div>
              )}
              <div className="ep-card" style={{padding:24}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:18,color:"#a0aec0"}}>All Registered Students</div>
                <div style={{overflowX:"auto"}}>
                  <table className="ep-table">
                    <thead><tr><th>Student</th><th>Reg No.</th><th>Department</th><th>Hall</th><th>Seat</th><th>Status</th></tr></thead>
                    <tbody>
                      {students.map(s=>(
                        <tr key={s.id}>
                          <td><div style={{display:"flex",alignItems:"center",gap:10}}><div className="avatar" style={{width:30,height:30,fontSize:12}}>{s.name?.[0]}</div><span style={{fontWeight:600}}>{s.name}</span></div></td>
                          <td>{s.regNo||"—"}</td>
                          <td>{s.department||"—"}</td>
                          <td><span className="badge badge-blue">{s.assignedHall||"—"}</span></td>
                          <td><span className="badge badge-muted">{s.assignedSeat||"—"}</span></td>
                          <td><span className={`badge ${s.assignedSeat&&s.assignedSeat!=="—"?"badge-green":"badge-amber"}`}>{s.assignedSeat&&s.assignedSeat!=="—"?"Assigned":"Pending"}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* ── STUDENTS ── */}
          {tab==="students"&&(
            <div className="fade-in">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <h2 style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>Students</h2>
                <button className="btn-primary" onClick={()=>setAddOpen(true)} style={{padding:"10px 22px",fontSize:13}}><span>+ Add Student</span></button>
              </div>

              {/* CSV Upload */}
              <div className="ep-card" style={{padding:20,marginBottom:24}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:4,color:"#a0aec0"}}>📤 Upload Student Data (CSV)</div>
                <div style={{fontSize:12,color:"#4a5568",marginBottom:12}}>CSV format: name, regNo, email, department, semester</div>
                {csvMsg&&<div className={csvMsg.startsWith("✅")?"success-box":"err-box"}>{csvMsg}</div>}
                <div
                  ref={dragRef}
                  className="drop-zone"
                  onClick={()=>fileRef.current?.click()}
                  onDragOver={e=>{e.preventDefault();dragRef.current?.classList.add("drag-over");}}
                  onDragLeave={()=>dragRef.current?.classList.remove("drag-over")}
                  onDrop={onDrop}
                >
                  <div style={{fontSize:28,marginBottom:8}}>📁</div>
                  <div style={{fontSize:14,fontWeight:600,color:"#63b3ed"}}>Click to upload or drag & drop CSV</div>
                  <div style={{fontSize:12,color:"#4a5568",marginTop:4}}>Duplicate reg numbers will be skipped</div>
                </div>
                <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={onFileChange}/>
                <div style={{marginTop:10,fontSize:11,color:"#4a5568"}}>
                  <strong style={{color:"#718096"}}>Sample CSV:</strong> name,regNo,email,department,semester
                </div>
              </div>

              {students.map(s=>(
                <div key={s.id} className="student-row">
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <div className="avatar" style={{width:44,height:44,fontSize:17}}>{s.name?.[0]}</div>
                    <div>
                      <div style={{fontWeight:700,fontSize:15}}>{s.name}</div>
                      <div style={{fontSize:12,color:"#718096",marginTop:2}}>{s.regNo||"—"} · {s.department||"—"} · {s.semester||"—"}</div>
                      <div style={{fontSize:11,color:"#4a5568",marginTop:3}}>🏛️ {s.assignedHall||"Not assigned"} · 💺 {s.assignedSeat||"—"}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,flexShrink:0}}>
                    <button className="btn-edit" onClick={()=>setEditS({...s})}>✏️ Edit</button>
                    <button className="btn-danger" onClick={()=>setDelId(s.id)}>🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── SEATING ── */}
          {tab==="seating"&&(
            <div className="fade-in">
              <h2 style={{fontSize:22,fontWeight:800,marginBottom:6,letterSpacing:-0.5}}>Auto Seating Arrangement</h2>
              <p style={{fontSize:13,color:"#718096",marginBottom:24}}>Students are assigned interleaved section seats in Reg. No. order — A1, B1, C1, D1, A2, B2, C2, D2...</p>

              {/* Hall configs */}
              <div className="ep-card" style={{padding:22,marginBottom:20}}>
                <div style={{fontSize:14,fontWeight:700,color:"#a0aec0",marginBottom:16}}>🏛️ Hall Configuration</div>
                {halls.map(h=>(
                  <div key={h.id} className="hall-config-card">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <span style={{fontWeight:700,color:"#63b3ed"}}>{h.name}</span>
                        <span style={{fontSize:12,color:"#718096",marginLeft:10}}>Capacity: <strong style={{color:"#68d391"}}>{h.capacity||(h.rows*h.cols)}</strong> seats · Sections: <strong style={{color:"#f6ad55"}}>{(h.sections||["A","B","C","D"]).join(", ")}</strong> · {h.seatsPerSection||Math.ceil((h.capacity||32)/(h.sections||["A","B","C","D"]).length)} seats/section</span>
                      </div>
                      <button className="btn-danger" onClick={()=>{removeHall(h.id);setSeatingDone(false);}}>Remove</button>
                    </div>
                    {/* mini seat grid preview — each row is one number, sections grouped with gap */}
                    <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:4}}>
                      {(()=>{
                        const secs=h.sections||["A","B","C","D"];
                        const sps=h.seatsPerSection||Math.ceil((h.capacity||32)/secs.length);
                        const secColors={"A":"rgba(99,179,237,0.25)","B":"rgba(104,211,145,0.25)","C":"rgba(246,173,85,0.25)","D":"rgba(252,129,129,0.25)","E":"rgba(127,156,245,0.25)","F":"rgba(79,209,197,0.25)"};
                        const secBorder={"A":"rgba(99,179,237,0.5)","B":"rgba(104,211,145,0.5)","C":"rgba(246,173,85,0.5)","D":"rgba(252,129,129,0.5)","E":"rgba(127,156,245,0.5)","F":"rgba(79,209,197,0.5)"};
                        const secText={"A":"#63b3ed","B":"#68d391","C":"#f6ad55","D":"#fc8181","E":"#7f9cf5","F":"#4fd1c5"};
                        const rows=[];
                        const maxShow=Math.min(sps,6);
                        for(let num=1;num<=maxShow;num++){
                          const rowCells=[];
                          secs.forEach((sec,si)=>{
                            const label=`${sec}${num}`;
                            const occupied=students.find(s=>s.assignedHall===h.name&&s.assignedSeat===label);
                            // add gap after every 2 sections
                            if(si>0 && si%2===0){
                              rowCells.push(<div key={`gap-${num}-${si}`} style={{width:10}}/>);
                            }
                            rowCells.push(
                              <div key={label}
                                style={{
                                  width:38,height:28,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",
                                  fontSize:11,fontWeight:700,border:`1px solid ${occupied?"rgba(99,179,237,0.6)":secBorder[sec]||"rgba(255,255,255,0.15)"}`,
                                  background:occupied?"rgba(99,179,237,0.2)":(secColors[sec]||"rgba(255,255,255,0.04)"),
                                  color:occupied?"#63b3ed":(secText[sec]||"#718096"),
                                  transition:"all 0.2s"
                                }}
                                title={occupied?occupied.name:label}
                              >{label}</div>
                            );
                          });
                          rows.push(<div key={num} style={{display:"flex",gap:4,alignItems:"center"}}>{rowCells}</div>);
                        }
                        if(sps>6) rows.push(
                          <div key="more" style={{fontSize:11,color:"#4a5568",paddingLeft:2,marginTop:2}}>
                            ···  {(sps-6)*secs.length} more seats
                          </div>
                        );
                        return rows;
                      })()}
                    </div>
                  </div>
                ))}
                {/* Add hall */}
                <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap",marginTop:14}}>
                  <div style={{flex:2,minWidth:120}}>
                    <label className="ep-label">Hall Name</label>
                    <input className="ep-input" placeholder="e.g. Hall-C" value={newHall.name} onChange={e=>setNewHall(p=>({...p,name:e.target.value}))}/>
                  </div>
                  <div style={{flex:1,minWidth:80}}>
                    <label className="ep-label">Capacity</label>
                    <input className="ep-input" type="number" min={1} max={500} placeholder="e.g. 40" value={newHall.capacity} onChange={e=>setNewHall(p=>({...p,capacity:e.target.value}))}/>
                  </div>
                  <div style={{flex:1,minWidth:120,display:"flex",alignItems:"flex-end",paddingBottom:2}}>
                    <div style={{background:"rgba(246,173,85,0.08)",border:"1px solid rgba(246,173,85,0.25)",borderRadius:10,padding:"10px 14px",width:"100%"}}>
                      <div style={{fontSize:11,color:"#718096",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8}}>Auto Sections</div>
                      <div style={{fontSize:13,color:"#f6ad55",fontWeight:700}}>
                        {(()=>{const cap=parseInt(newHall.capacity)||40;const n=cap<=15?2:cap<=30?3:cap<=80?4:cap<=120?5:6;return["A","B","C","D","E","F"].slice(0,n).join(", ")+" (auto)"})()}
                      </div>
                    </div>
                  </div>
                  <button className="btn-green" onClick={addHall} style={{marginBottom:1,flexShrink:0}}>+ Add Hall</button>
                </div>
              </div>

              {/* Arrange button */}
              <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
                <button className="btn-primary" onClick={doArrangeSeating} style={{padding:"12px 28px",fontSize:14}}>
                  <span>⚡ Auto-Arrange Seats (by Reg No.)</span>
                </button>
                <div style={{fontSize:13,color:"#718096"}}>{students.length} students · {totalSeats} seats available</div>
                {totalSeats<students.length&&<span className="badge badge-rose">⚠️ Not enough seats!</span>}
              </div>

              {/* Download + Seating Table — always shown in seating tab */}
              <div className="ep-card fade-in" style={{padding:22}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#a0aec0"}}>📋 Seating List</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="btn-green" onClick={()=>dlCSV(students,exam)}>📥 CSV</button>
                    <button className="btn-edit" onClick={()=>dlExcel(students,exam)}>📊 Excel</button>
                    <button className="btn-amber" onClick={()=>dlPDF(students,exam)}>📄 PDF</button>
                    <button className="btn-ghost" onClick={()=>dlDOCX(students,exam)} style={{padding:"8px 14px",fontSize:13}}>📝 Word</button>
                  </div>
                </div>
                {students.filter(s=>s.assignedSeat&&s.assignedSeat!=="—").length===0?(
                  <div style={{textAlign:"center",padding:"24px 0",color:"#4a5568",fontSize:13}}>
                    <div style={{fontSize:32,marginBottom:8}}>💺</div>
                    Click "Auto-Arrange Seats" above to assign seats and enable downloads.
                  </div>
                ):(
                  <div style={{overflowX:"auto"}}>
                    <table className="ep-table">
                      <thead><tr><th>#</th><th>Name</th><th>Reg No.</th><th>Hall</th><th>Seat</th></tr></thead>
                      <tbody>
                        {[...students].filter(s=>s.assignedSeat&&s.assignedSeat!=="—").sort((a,b)=>String(a.regNo).localeCompare(String(b.regNo),undefined,{numeric:true})).map((s,i)=>(
                          <tr key={s.id}>
                            <td style={{color:"#4a5568"}}>{i+1}</td>
                            <td style={{fontWeight:600}}>{s.name}</td>
                            <td><span className="badge badge-blue">{s.regNo}</span></td>
                            <td>{s.assignedHall}</td>
                            <td><span className="badge badge-green">{s.assignedSeat}</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── EXAM CONFIG ── */}
          {tab==="exam"&&(
            <div className="fade-in">
              <h2 style={{fontSize:22,fontWeight:800,marginBottom:6,letterSpacing:-0.5}}>Exam Configuration</h2>
              <p style={{fontSize:13,color:"#718096",marginBottom:24}}>Set the exact date & time when students can see their seat. Admin has full control over the unlock time.</p>

              {examSaved&&<div className="success-box">✅ Exam saved! Students will see their seats after the unlock time.</div>}

              <div className="ep-card" style={{padding:28}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
                  <div style={{gridColumn:"1/-1"}}>
                    <label className="ep-label">Exam Name</label>
                    <input className="ep-input" placeholder="e.g. Semester 6 Final Examination" value={examForm.examName} onChange={e=>setExamForm(p=>({...p,examName:e.target.value}))}/>
                  </div>
                  <div>
                    <label className="ep-label">Exam Date</label>
                    <input className="ep-input" type="date" value={examForm.date} onChange={e=>setExamForm(p=>({...p,date:e.target.value}))}/>
                  </div>
                  <div>
                    <label className="ep-label">Exam Time</label>
                    <input className="ep-input" type="time" value={examForm.time} onChange={e=>setExamForm(p=>({...p,time:e.target.value}))}/>
                  </div>
                </div>

                <div style={{background:"rgba(252,129,129,0.05)",border:"1px solid rgba(252,129,129,0.2)",borderRadius:12,padding:18,marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:18}}>🔒</span>
                    <div style={{fontSize:13,fontWeight:700,color:"#fc8181"}}>Seat Unlock Time</div>
                    <span className="badge badge-amber" style={{fontSize:10}}>Auto — 1 hr before exam</span>
                  </div>
                  {examForm.date&&examForm.time?(
                    <div style={{background:"rgba(246,173,85,0.08)",border:"1px solid rgba(246,173,85,0.2)",borderRadius:10,padding:"12px 16px"}}>
                      <div style={{fontSize:12,color:"#718096",marginBottom:4}}>Seats will be visible to students from:</div>
                      <div style={{fontSize:18,fontWeight:800,color:"#f6ad55"}}>
                        {(()=>{const dt=new Date(`${examForm.date}T${examForm.time}`);dt.setHours(dt.getHours()-1);return dt.toLocaleString("en-IN",{weekday:"short",day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});})()}
                      </div>
                      <div style={{fontSize:11,color:"#4a5568",marginTop:4}}>= Exam time ({examForm.time}) − 1 hour</div>
                    </div>
                  ):(
                    <div style={{fontSize:13,color:"#4a5568",fontStyle:"italic"}}>Set exam date & time above to see the auto unlock time.</div>
                  )}
                </div>

                <button className="btn-primary" onClick={saveExam} style={{padding:"13px 32px",fontSize:14}}>
                  <span>💾 Save Exam Configuration</span>
                </button>
              </div>
            </div>
          )}
        </main>
      </div>

      {/* Modals */}
      {editS&&(
        <div className="modal-overlay">
          <div className="modal-box">
            <h3 style={{fontSize:18,fontWeight:800,marginBottom:22,color:"#63b3ed"}}>Edit Student</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {FIELDS.map(([label,key])=>(
                <div key={key}>
                  <label className="ep-label">{label}</label>
                  <input className="ep-input" value={editS[key]||""} onChange={e=>{const v=e.target.value;setEditS(p=>({...p,[key]:v}));}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10,marginTop:22}}>
              <button className="btn-primary" onClick={saveEdit} style={{flex:1,padding:"12px",fontSize:14,justifyContent:"center"}}><span>Save Changes</span></button>
              <button className="btn-ghost" onClick={()=>setEditS(null)} style={{flex:1,padding:"12px",fontSize:14,justifyContent:"center"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {addOpen&&(
        <div className="modal-overlay">
          <div className="modal-box">
            <h3 style={{fontSize:18,fontWeight:800,marginBottom:22,color:"#63b3ed"}}>Add New Student</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {FIELDS.map(([label,key])=>(
                <div key={key}>
                  <label className="ep-label">{label}</label>
                  <input className="ep-input" value={newS[key]||""} onChange={e=>{const v=e.target.value;setNewS(p=>({...p,[key]:v}));}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10,marginTop:22}}>
              <button className="btn-primary" onClick={doAdd} style={{flex:1,padding:"12px",fontSize:14,justifyContent:"center"}}><span>Add Student</span></button>
              <button className="btn-ghost" onClick={()=>setAddOpen(false)} style={{flex:1,padding:"12px",fontSize:14,justifyContent:"center"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {delId&&(
        <div className="modal-overlay">
          <div className="modal-box" style={{maxWidth:380,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
            <h3 style={{fontSize:18,fontWeight:800,color:"#fc8181",marginBottom:10}}>Delete Student?</h3>
            <p style={{color:"#718096",fontSize:14,lineHeight:1.6,marginBottom:24}}>This action cannot be undone.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={doDelete} style={{flex:1,padding:"12px",background:"rgba(220,50,50,0.8)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>Delete</button>
              <button className="btn-ghost" onClick={()=>setDelId(null)} style={{flex:1,padding:"12px",fontSize:14,justifyContent:"center"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── localStorage helpers ─────────────────────────────────────
const LS_STUDENTS="ep_students";
const LS_EXAM="ep_exam";
const LS_HALLS="ep_halls";

const DEFAULT_STUDENTS=[
  {id:1,name:"Arjun Krishnan",email:"arjun@student.edu",password:"Arjun@123",regNo:"REG2024001",department:"Computer Science",semester:"6th Semester",hallTicket:"HT2024001",assignedHall:"",assignedSeat:"",exams:[]},
  {id:2,name:"Priya Nair",email:"priya@student.edu",password:"Priya@123",regNo:"REG2024002",department:"Electronics",semester:"4th Semester",hallTicket:"HT2024002",assignedHall:"",assignedSeat:"",exams:[]},
  {id:3,name:"Rahul Menon",email:"rahul@student.edu",password:"Rahul@123",regNo:"REG2024003",department:"Mechanical",semester:"2nd Semester",hallTicket:"",assignedHall:"",assignedSeat:"",exams:[]},
];
const DEFAULT_HALLS=[{id:1,name:"Hall-1",capacity:40,sections:["A","B","C","D"],seatsPerSection:10,rows:10,cols:4},{id:2,name:"Hall-2",capacity:40,sections:["A","B","C","D"],seatsPerSection:10,rows:10,cols:4}];

function lsGet(key,fallback){
  try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}
  catch{return fallback;}
}
function lsSet(key,val){
  try{localStorage.setItem(key,JSON.stringify(val));}catch{}
}

// ─── App Root ────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("landing");
  const [user,setUser]=useState(null);
  const [students,setStudentsRaw]=useState(()=>lsGet(LS_STUDENTS,DEFAULT_STUDENTS));
  const [exam,setExamRaw]=useState(()=>lsGet(LS_EXAM,null));
  const [halls,setHallsRaw]=useState(()=>lsGet(LS_HALLS,DEFAULT_HALLS));

  const setStudents=val=>{
    setStudentsRaw(prev=>{const n=typeof val==="function"?val(prev):val;lsSet(LS_STUDENTS,n);return n;});
  };
  const setExam=val=>{setExamRaw(val);lsSet(LS_EXAM,val);};
  const setHalls=val=>{
    setHallsRaw(prev=>{const n=typeof val==="function"?val(prev):val;lsSet(LS_HALLS,n);return n;});
  };

  const onSuccess=({role,id})=>{setUser({role,id});setPage(role==="admin"?"admin":"student");};
  const logout=()=>{setUser(null);setPage("landing");};
  const currentStudent=user?.role==="student"?(students.find(s=>s.id===user.id)||null):null;

  return(
    <>
      {page==="landing"&&<LandingPage goLogin={()=>setPage("login")} goSignup={()=>setPage("signup")}/>}
      {page==="login"&&<LoginPage students={students} onSuccess={onSuccess} goBack={()=>setPage("landing")} goSignup={()=>setPage("signup")}/>}
      {page==="signup"&&<SignupPage goBack={()=>setPage("login")} onRegister={s=>setStudents(prev=>[...prev,s])}/>}
      {page==="admin"&&<AdminDashboard students={students} setStudents={setStudents} exam={exam} setExam={setExam} halls={halls} setHalls={setHalls} onLogout={logout}/>}
      {page==="student"&&currentStudent&&<StudentDashboard student={currentStudent} exam={exam} onLogout={logout}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
